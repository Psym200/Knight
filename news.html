<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronique de l'Arche - Journal de Susan Anders</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-dark: #040711;       /* Fond d'espace profond encore plus sombre */
            --bg-panel: #080f1e;      /* Interface cockpit sombre */
            --bg-terminal: #060a14;   /* Terminal de données */
            
            /* Palette de couleurs tactiques */
            --color-accent: #00f0ff;         /* Cyan néon */
            --color-accent-green: #00ff66;   /* Vert néon */
            --color-accent-yellow: #ffcc00;  /* Jaune néon */
            
            /* Effets de lueur */
            --color-glow: rgba(0, 240, 255, 0.15);
            --color-glow-green: rgba(0, 255, 102, 0.15);
            --color-glow-yellow: rgba(255, 204, 0, 0.15);
            
            --color-border: #1e293b;   /* Métal de structure */
            --text-light: #e2e8f0;    /* Lecture haute intensité */
            --text-muted: #64748b;    /* Métadonnées */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 30% 30%, rgba(0, 255, 102, 0.04) 0%, transparent 60%),
                radial-gradient(circle at 70% 70%, rgba(255, 204, 0, 0.04) 0%, transparent 60%),
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 30px 30px, 30px 30px;
        }

        /* En-tête HUD avec lueur jaune */
        .app-header {
            background: linear-gradient(180deg, #070b14 0%, #03050a 100%);
            border-bottom: 2px solid var(--color-accent-yellow);
            box-shadow: 0 0 15px var(--color-glow-yellow);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .app-title {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            letter-spacing: 2px;
            color: var(--color-accent-yellow);
            font-size: 1.4rem;
            text-shadow: 0 0 8px var(--color-glow-yellow);
        }

        .main-wrapper {
            display: flex;
            width: 100%;
            height: calc(100vh - 80px);
            margin-top: 80px;
        }

        /* Sommaire gauche */
        .sidebar {
            width: 380px;
            background-color: var(--bg-panel);
            border-right: 2px solid var(--color-border);
            display: flex;
            flex-direction: column;
            height: 100%;
            flex-shrink: 0;
        }

        .sidebar-search {
            padding: 15px;
            border-bottom: 1px solid var(--color-border);
        }

        .custom-input {
            width: 100%;
            background-color: #03050a;
            border: 1px solid var(--color-border);
            color: var(--color-accent-green);
            padding: 10px 12px;
            border-radius: 4px;
            font-size: 0.95rem;
            outline: none;
            font-family: 'Share Tech Mono', monospace;
            transition: all 0.2s;
        }

        .custom-input:focus {
            border-color: var(--color-accent-green);
            box-shadow: 0 0 8px var(--color-glow-green);
        }

        .articles-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Cartes de flux */
        .article-card {
            background-color: #060a14;
            border: 1px solid var(--color-border);
            border-radius: 4px;
            padding: 15px;
            padding-right: 45px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .article-card:hover {
            border-color: rgba(255, 204, 0, 0.4);
            background-color: #0c1224;
        }

        .article-card.active {
            border-color: var(--color-accent-green);
            background-color: rgba(0, 255, 102, 0.03);
            box-shadow: 0 0 10px var(--color-glow-green);
        }

        .article-card-delete {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            opacity: 0.5;
            transition: all 0.2s;
            padding: 6px 8px;
            border-radius: 4px;
        }

        .article-card-delete:hover {
            color: #ef4444;
            background-color: rgba(239, 68, 68, 0.15);
            opacity: 1;
        }

        /* Zone d'affichage */
        .sheet-container {
            flex: 1;
            background-color: var(--bg-terminal);
            height: 100%;
            overflow-y: auto;
            padding: 35px;
            position: relative;
        }

        /* Écran holographique */
        .rpg-sheet {
            background-color: #050811;
            color: var(--text-light);
            border: 2px solid var(--color-border);
            border-radius: 4px;
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .rpg-sheet::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 2;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        .rpg-header {
            background-color: #080f1e;
            border-bottom: 2px solid var(--color-border);
            padding: 25px 30px;
        }

        .rpg-meta {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.85rem;
            color: var(--color-accent-green);
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid var(--color-border);
            padding-bottom: 8px;
            margin-bottom: 8px;
        }

        .rpg-header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: #ffffff;
            line-height: 1.2;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 6px rgba(0, 255, 102, 0.2);
        }

        .rpg-content {
            padding: 35px 40px;
            font-size: 1.05rem;
            line-height: 1.7;
            text-align: justify;
            white-space: pre-wrap;
            color: #cbd5e1;
        }

        /* Boutons HUD */
        .rpg-btn {
            background-color: #050811;
            border: 1px solid var(--color-border);
            color: var(--text-light);
            padding: 10px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        .rpg-btn:hover {
            background-color: #111a2e;
            border-color: var(--color-accent-green);
            color: var(--color-accent-green);
            box-shadow: 0 0 8px var(--color-glow-green);
        }

        .rpg-btn-primary {
            background-color: rgba(0, 255, 102, 0.05);
            border-color: var(--color-accent-green);
            color: var(--color-accent-green);
            text-shadow: 0 0 5px var(--color-accent-green);
        }

        .rpg-btn-primary:hover {
            background-color: rgba(0, 255, 102, 0.15);
            color: #ffffff;
        }

        /* Boîte de dialogue */
        .rpg-modal {
            display: none;
            position: fixed;
            inset: 0;
            background-color: rgba(2, 6, 17, 0.9);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }

        .rpg-modal-content {
            background-color: var(--bg-panel);
            color: var(--text-light);
            width: 100%;
            max-width: 650px;
            border: 2px solid var(--color-accent-green);
            border-radius: 4px;
            box-shadow: 0 0 25px var(--color-glow-green);
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        /* Inputs de terminal */
        .parchment-input {
            background-color: #03050a;
            border: 1px solid var(--color-border);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            padding: 10px 14px;
            border-radius: 4px;
            outline: none;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.2s;
        }
        .parchment-input:focus {
            border-color: var(--color-accent-green);
            box-shadow: 0 0 8px var(--color-glow-green);
            background-color: #050914;
        }

        @media (max-width: 768px) {
            .main-wrapper {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: 40%;
                border-right: none;
                border-bottom: 3px double var(--color-border);
            }
            .sheet-container {
                height: 60%;
                padding: 15px;
            }
        }
    </style>
</head>
<body class="h-full flex flex-col overflow-hidden">

    <!-- EN-TÊTE -->
    <header class="app-header">
        <div class="flex items-center gap-3">
            <div>
                <h1 class="app-title">Journal de Susan Anders</h1>
            </div>
        </div>

        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2">
                <select id="mode-select" onchange="window.changeSyncMode(this.value)" class="parchment-input text-xs py-1.5 px-2 border-[#c3a163] bg-stone-900 text-amber-500 rounded font-serif cursor-pointer">
                    <option value="shared">Codex de la Table (Partagé)</option>
                    <option value="local">Codex Personnel (Local/Privé)</option>
                </select>
            </div>

            <a href="index.html" class="rpg-btn">
                <i class="fa-solid fa-map-location-dot"></i> Bestiaire
            </a>

            <button onclick="window.toggleModal(true)" class="rpg-btn rpg-btn-primary">
                <i class="fa-solid fa-feather-pointed"></i> Nouvel article
            </button>
        </div>
    </header>

    <!-- ZONE PRINCIPALE -->
    <div class="main-wrapper">
        
        <!-- SOMMAIRE GAUCHE -->
        <aside class="sidebar">
            <div class="sidebar-search">
                <input type="text" id="search-input" oninput="window.applyFilters()" placeholder="Trouver un article..." class="custom-input">
            </div>
            <div class="creatures-list" id="creatures-list">
                <!-- Dynamique -->
            </div>
        </aside>

        <!-- ESPACE DE LECTURE DROIT -->
        <main class="sheet-container">
            <div id="rpg-sheet-display" class="rpg-sheet">
                <!-- Contenu actif -->
            </div>
        </main>
    </div>

    <!-- BOITE DE DIALOGUE (REDACTION) -->
    <div id="write-modal" class="rpg-modal" onclick="if(event.target === this) window.toggleModal(false)">
        <div class="rpg-modal-content">
            <div class="p-6 border-b border-slate-700 flex justify-between items-center" style="background-color: #080f1e;">
                <h3 class="text-lg font-bold font-serif uppercase tracking-wider text-cyan-400" style="font-family: 'Orbitron', serif;">Nouvel article</h3>
                <button onclick="window.toggleModal(false)" class="text-slate-400 hover:text-cyan-400"><i class="fa-solid fa-circle-xmark text-xl"></i></button>
            </div>
            <form id="chronicle-form" onsubmit="window.saveData(event)" class="p-6 flex flex-col gap-4 overflow-y-auto">
                <input type="hidden" id="form-id">
                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold uppercase text-slate-400" style="font-family: 'Orbitron', serif;">Nom de l'article</label>
                    <input type="text" id="form-title" required class="parchment-input" placeholder="Ex: ALERTE GARDE : ACTIVITÉ DE LA CHAIR A ROME">
                </div>

    <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold uppercase text-slate-400" style="font-family: 'Orbitron', serif;">Niveau de priorité *</label>
            <select id="form-priority" class="parchment-input">
                <option value="green">COMMUN (Vert)</option>
                <option value="orange">A NOTIFIER (Orange)</option>
                <option value="red">PRIORITAIRE (Rouge)</option>
            </select>
    </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-bold uppercase text-slate-400" style="font-family: 'Orbitron', serif;">Auteur</label>
                        <input type="text" id="form-author" required class="parchment-input" placeholder="Ex: Coterie Cyclope">
                    </div>
                    <div class="flex flex-col gap-1.5">
                        <label class="text-xs font-bold uppercase text-slate-400" style="font-family: 'Orbitron', serif;">Date</label>
                        <input type="text" id="form-date" required class="parchment-input" placeholder="Ex: 11 Janvier 2038 - 07h13">
                    </div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-xs font-bold uppercase text-slate-400" style="font-family: 'Orbitron', serif;">Article</label>
                    <textarea id="form-content" required rows="10" class="parchment-input resize-none" placeholder="Données interceptées, menaces de l'Anathème ou compte-rendu d'opération..."></textarea>
                </div>

                <div class="border-t border-slate-700 pt-4 mt-2 flex justify-end gap-3">
                    <button type="button" onclick="window.toggleModal(false)" class="rpg-btn" style="background-color: transparent; border-color: #475569;">Annuler</button>
                    <button type="submit" class="rpg-btn rpg-btn-primary"><i class="fa-solid fa-share-nodes"></i> Diffuser</button>
                </div>
            </form>
        </div>
    </div>

    <!-- MODAL DE CONFIRMATION DE SUPPRESSION -->
    <div id="confirm-modal" style="display: none;" class="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-[1000] backdrop-blur-sm">
        <div class="bg-[#0d1527] text-slate-200 border-2 border-red-500 rounded p-6 max-w-sm w-full text-center shadow-2xl">
            <i class="fa-solid fa-triangle-exclamation text-3xl text-red-500 mb-3 animate-pulse"></i>
            <h3 class="text-lg font-bold mb-2 uppercase tracking-wide text-red-400" style="font-family: 'Orbitron', serif;">Purge du Signal</h3>
            <p class="text-sm mb-6 text-slate-400">Confirmez-vous l'effacement définitif de ce fichier sur le réseau ?</p>
            <div class="flex justify-center gap-4">
                <button onclick="window.closeDeleteConfirmation()" class="rpg-btn" style="background-color: transparent; border-color: #475569;">
                    Conserver
                </button>
                <button onclick="window.confirmDelete()" class="rpg-btn bg-red-950/20 border-red-600 text-red-400 hover:bg-red-900 hover:text-white">
                    Purger
                </button>
            </div>
        </div>
    </div>

    <!-- SCRIPT APPLICATION SYNC ET LOGIQUE COMMUNE -->
    <script>
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'journal-susan';
        
        window.creatures = [];
        window.activeCreatureId = null;
        window.pendingDeleteId = null;

        // Sons héraldiques
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        window.playSound = function(type) {
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);
                
                if (type === 'click') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(440, audioCtx.currentTime); // Mi (E4)
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(880, audioCtx.currentTime); // Octave
                    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                    osc.start(); osc2.start();
                    osc.stop(audioCtx.currentTime + 0.15);
                    osc2.stop(audioCtx.currentTime + 0.15);
                } else if (type === 'success') {
                    const osc3 = audioCtx.createOscillator();
                    osc3.connect(gain);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // Do
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.05); // Mi
                    osc3.type = 'sine';
                    osc3.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.1); // Sol
                    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
                    osc.start(); osc2.start(); osc3.start();
                    osc.stop(audioCtx.currentTime + 0.5);
                    osc2.stop(audioCtx.currentTime + 0.5);
                    osc3.stop(audioCtx.currentTime + 0.5);
                }
            } catch (e) {
                console.warn(e);
            }
        };

        window.showToast = function(message) {
            const t = document.getElementById('toast');
            if (t) {
                t.textContent = message;
                t.style.display = 'block';
                setTimeout(() => { t.style.display = 'none'; }, 4000);
            }
        };

        window.changeSyncMode = function(mode) {
            window.playSound('click');
            localStorage.setItem(`knight_journal_mode_${appId}`, mode);
            window.location.reload();
        };

        // Ouverture / Fermeture Boite de dialogue
        window.toggleModal = function(show) {
            window.playSound('click');
            const m = document.getElementById('write-modal');
            if (m) {
                m.style.display = show ? 'flex' : 'none';
            }
            if (show) {
                const f = document.getElementById('chronicle-form');
                if (f) f.reset();
                document.getElementById('form-id').value = "";
            }
        };

        window.applyFilters = function() {
            window.renderList();
        };

        window.renderList = function() {
    const listContainer = document.getElementById('creatures-list');
    if (!listContainer) return;
    listContainer.innerHTML = "";

    const priorityColors = { 'red': '#ef4444', 'orange': '#f59e0b', 'green': '#00ff66' };
    const searchVal = document.getElementById('search-input')?.value.toLowerCase() || "";

    const filtered = window.creatures.filter(c => 
        (c.title || "").toLowerCase().includes(searchVal) || 
        (c.content || "").toLowerCase().includes(searchVal)
    );

    filtered.sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

    filtered.forEach(c => {
        const pColor = priorityColors[c.priority] || '#ffffff';
        const card = document.createElement('div');
        card.className = `article-card ${c.id === window.activeCreatureId ? 'active' : ''}`;
        card.onclick = () => { window.selectArticle(c.id); };

        card.innerHTML = `
            <div style="font-family:'Orbitron',sans-serif; font-weight:700; font-size:0.95rem; color:${pColor}; margin-bottom:8px;">${c.title}</div>
            <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-family:'Share Tech Mono', monospace; color:var(--text-muted);">
                <span>${c.author}</span>
                <span>${c.date}</span>
            </div>
        `;
        listContainer.appendChild(card);
    });
};

        window.selectArticle = function(id) {
            window.playSound('click');
            window.activeCreatureId = id;
            window.renderList();
            window.renderActiveSheet();
        };

        window.renderActiveSheet = function() {
    const container = document.getElementById('rpg-sheet-display');
    if (!container) return;
    
    let c = window.activeCreatureId ? window.creatures.find(item => item.id === window.activeCreatureId) : null;
    
    if (!c) {
        container.innerHTML = `<div style="padding:45px; text-align:center; color:var(--color-accent-green);">Aucun article sélectionné</div>`;
        return;
    }

    const priorityColors = { 'red': '#ef4444', 'orange': '#f59e0b', 'green': '#00ff66' };
    const pColor = priorityColors[c.priority] || '#ffffff';

    container.innerHTML = `
        <div class="rpg-header">
            <div class="rpg-meta">
                <span>ÉMETTEUR : ${c.author}</span>
                <span>CANAL : ${c.date}</span>
            </div>
            <h2 class="rpg-header-title" style="color: ${pColor}; text-shadow: 0 0 5px ${pColor};">// ${c.title}</h2>
        </div>
        <div class="rpg-content font-sans">${c.content}</div>
    `;
};

        window.showDeleteConfirmation = function(id) {
            window.pendingDeleteId = id;
            const modal = document.getElementById('confirm-modal');
            if (modal) modal.style.display = 'flex';
        };

        window.closeDeleteConfirmation = function() {
            const modal = document.getElementById('confirm-modal');
            if (modal) modal.style.display = 'none';
            window.pendingDeleteId = null;
        };

        window.confirmDelete = async function() {
            if (window.pendingDeleteId) {
                await window.deleteCreature(window.pendingDeleteId);
            }
            window.closeDeleteConfirmation();
        };

        // Sauvegarde locale de secours
        window.saveCreature = async function(obj) {
            window.playSound('success');
            const docId = obj.id || crypto.randomUUID();
            obj.id = docId;
            obj.updatedAt = Date.now();

            const index = window.creatures.findIndex(c => c.id === docId);
            if (index > -1) {
                window.creatures[index] = obj;
            } else {
                window.creatures.push(obj);
            }

            localStorage.setItem(`knight_journal_local_${appId}`, JSON.stringify(window.creatures));
            window.activeCreatureId = docId;
            window.showToast("Rapport consigné localement.");
            window.renderList();
            window.renderActiveSheet();
        };

        window.deleteCreature = async function(id) {
            window.playSound('click');
            window.creatures = window.creatures.filter(c => c.id !== id);
            localStorage.setItem(`knight_journal_local_${appId}`, JSON.stringify(window.creatures));
            window.showToast("Dossier purgé.");
            
            if (window.activeCreatureId === id) {
                if (window.creatures.length > 0) {
                    window.activeCreatureId = window.creatures[0].id;
                } else {
                    window.activeCreatureId = null;
                }
            }
            window.renderList();
            window.renderActiveSheet();
        };

        window.saveData = async function(event) {
            event.preventDefault();
            const obj = {
                id: document.getElementById('form-id').value || null,
                title: document.getElementById('form-title').value.trim(),
                author: document.getElementById('form-author').value.trim(),
                date: document.getElementById('form-date').value.trim(),
                content: document.getElementById('form-content').value.trim(),
                priority: document.getElementById('form-priority').value
            };

            window.toggleModal(false);
            await window.saveCreature(obj);
        };

        window.loadLocalFallback = function() {
            const raw = localStorage.getItem(`knight_journal_local_${appId}`);
            if (raw) {
                try {
                    window.creatures = JSON.parse(raw);
                } catch(e) {
                    window.creatures = [];
                }
            }

            if (!window.activeCreatureId && window.creatures.length > 0) {
                window.activeCreatureId = window.creatures[0].id;
            }
            window.renderList();
            window.renderActiveSheet();
        };

        // Chargement initial
        document.addEventListener('DOMContentLoaded', () => {
            const savedMode = localStorage.getItem(`knight_journal_mode_${appId}`) || 'shared';
            const selectElement = document.getElementById('mode-select');
            if (selectElement) selectElement.value = savedMode;

            const syncBadge = document.getElementById('sync-badge');
            if (syncBadge) {
                if (savedMode === 'shared') {
                    syncBadge.innerHTML = "<span class='w-1.5 h-1.5 rounded-full bg-cyan-400 animate-ping'></span>RESEAU_ACTIF";
                    syncBadge.className = "bg-cyan-950/20 border border-cyan-500/30 px-3 py-1 rounded text-[10px] font-mono text-cyan-400 flex items-center gap-1.5";
                } else {
                    syncBadge.innerHTML = "<i class='fa-solid fa-feather'></i> NOYAU_LOCAL";
                    syncBadge.className = "bg-stone-900 border border-slate-700 px-2.5 py-1 rounded text-[10px] font-mono text-slate-400 flex items-center gap-1.5";
                }
            }
            
            window.loadLocalFallback();
        });
    </script>

    <!-- MODULE FIREBASE PARTAGÉ ASYNC (OPTIONNEL) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Définition de l'ID unique pour cette page
        const localAppId = typeof __app_id !== 'undefined' ? __app_id : 'journal-susan';
        let db = null;
        let auth = null;

        const baseLocalSave = window.saveCreature;
        window.saveCreature = async function(obj) {
            window.playSound('success');
            const savedMode = localStorage.getItem(`knight_journal_mode_${localAppId}`) || 'shared';
            
            if (savedMode === 'shared' && db && auth && auth.currentUser) {
                try {
                    const docId = obj.id || crypto.randomUUID();
                    obj.id = docId;
                    obj.updatedAt = Date.now();
                    // Utilisation de localAppId pour isoler les données de cette page
                    const ref = doc(db, 'artifacts', localAppId, 'public', 'data', 'journals', docId);
                    await setDoc(ref, obj);
                    window.activeCreatureId = docId;
                    window.showToast("Chronique envoyée au terminal central.");
                } catch (e) {
                    console.error("Save error, fallback to local:", e);
                    baseLocalSave(obj);
                }
            } else {
                baseLocalSave(obj);
            }
        };

        const baseLocalDelete = window.deleteCreature;
        window.deleteCreature = async function(id) {
            window.playSound('click');
            const savedMode = localStorage.getItem(`knight_journal_mode_${localAppId}`) || 'shared';
            
            if (savedMode === 'shared' && db && auth && auth.currentUser) {
                try {
                    const ref = doc(db, 'artifacts', localAppId, 'public', 'data', 'journals', id);
                    const currentItem = window.creatures.find(item => item.id === id);
                    if (currentItem) {
                        await setDoc(ref, { ...currentItem, deleted: true });
                        window.showToast("Signal purgé de l'Arche.");
                    }
                    if (window.activeCreatureId === id) {
                        window.activeCreatureId = null;
                    }
                } catch (e) {
                    console.error("Firestore error, fallback to local:", e);
                    baseLocalDelete(id);
                }
            } else {
                baseLocalDelete(id);
            }
        };

        function listenToDatabase() {
            const ref = collection(db, 'artifacts', localAppId, 'public', 'data', 'journals');
            const q = query(ref);

            onSnapshot(q, (snap) => {
                const data = [];
                snap.forEach((doc) => {
                    const docData = doc.data();
                    if (docData && !docData.deleted) {
                        data.push({ id: doc.id, ...docData });
                    }
                });
                window.creatures = data;
                
                if (window.activeCreatureId && !window.creatures.some(c => c.id === window.activeCreatureId)) {
                    window.activeCreatureId = null;
                }
                if (!window.activeCreatureId && window.creatures.length > 0) {
                    window.activeCreatureId = window.creatures[0].id;
                }
                
                window.renderList();
                window.renderActiveSheet();

                const syncBadge = document.getElementById('sync-badge');
                if (syncBadge && localStorage.getItem(`knight_journal_mode_${localAppId}`) !== 'local') {
                    syncBadge.innerHTML = "<span class='w-1.5 h-1.5 rounded-full bg-emerald-500 animate-ping'></span>RESEAU_ACTIF";
                    syncBadge.className = "bg-emerald-950/20 border border-emerald-600/30 px-3 py-1 rounded text-[10px] font-mono text-emerald-500 flex items-center gap-1.5";
                }
            }, (err) => {
                console.error("Sync failed:", err);
                window.loadLocalFallback();
            });
        }

        async function init() {
            const savedMode = localStorage.getItem(`knight_journal_mode_${localAppId}`) || 'shared';
            const selectElem = document.getElementById('mode-select');
            if (selectElem) selectElem.value = savedMode;

            if (savedMode === 'shared') {
                try {
                    const config = {
                        apiKey: "AIzaSyAbFhzscxcmUoZ9HnEawJLa0JiCmFayg60",
                        authDomain: "knight-c719f.firebaseapp.com",
                        projectId: "knight-c719f",
                        storageBucket: "knight-c719f.firebasestorage.app",
                        messagingSenderId: "605627921243",
                        appId: "1:605627921243:web:3a1d1e618c51d5d6bea07e"
                    };
                    const app = initializeApp(config);
                    db = getFirestore(app);
                    auth = getAuth(app);

                    // Connexion silencieuse à la base de données
                    await signInAnonymously(auth);
                    
                    // Écoute de l'état de connexion pour lancer la synchronisation
                    onAuthStateChanged(auth, (user) => {
                        if (user) {
                            listenToDatabase();
                        } else {
                            window.loadLocalFallback();
                        }
                    });

                } catch (e) {
                    console.error("Firebase init failed:", e);
                    window.loadLocalFallback();
                }
            } else {
                window.loadLocalFallback();
            }
        }

        init();
    </script>
